name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyQt5 pynput pyinstaller

      - name: Inject version from tag
        run: |
          $ver = "${{ env.VERSION }}"
          $file = "src/status_panel.py"
          (Get-Content $file -Raw) -replace '版本号：v[\d.]+', "版本号：$ver" | Set-Content $file -NoNewline

          # Update version_info.py for EXE metadata
          $nums = $ver.TrimStart('v').Split('.')
          $major = $nums[0]; $minor = $nums[1]; $patch = $nums[2]
          $tuple = "($major, $minor, $patch, 0)"
          $verStr = "$major.$minor.$patch.0"
          $viFile = "tools/version_info.py"
          $vi = Get-Content $viFile -Raw
          $vi = $vi -replace 'filevers=\(\d+, \d+, \d+, \d+\)', "filevers=$tuple"
          $vi = $vi -replace 'prodvers=\(\d+, \d+, \d+, \d+\)', "prodvers=$tuple"
          $vi = $vi -replace "FileVersion', u'[\d.]+'", "FileVersion', u'$verStr'"
          $vi = $vi -replace "ProductVersion', u'[\d.]+'", "ProductVersion', u'$verStr'"
          Set-Content $viFile $vi -NoNewline

      - name: Restore donate QR image
        run: |
          $b64 = Get-Content "data/donate_qr.b64" -Raw
          [System.IO.File]::WriteAllBytes("$PWD/shoukuanma.jpg", [Convert]::FromBase64String($b64))

      - name: Build EXE
        run: python -m PyInstaller tools/build_onefile.spec --noconfirm

      - name: Verify build output
        run: |
          if (!(Test-Path "dist/xiaotong.exe")) { Write-Error "Build failed: xiaotong.exe not found"; exit 1 }
          $size = (Get-Item "dist/xiaotong.exe").Length / 1MB
          Write-Host "Build successful: xiaotong.exe ($([math]::Round($size, 1)) MB)"

      - name: Rename build output to include version
        run: |
          $ver = "${{ env.VERSION }}"
          Rename-Item -Path "dist/xiaotong.exe" -NewName "xiaotong-$ver.exe"
          Write-Host "Renamed build to xiaotong-$ver.exe"

      - name: Delete old asset if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ env.VERSION }}"
          $repo = "${{ github.repository }}"
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
          try {
            $release = Invoke-RestMethod "https://api.github.com/repos/$repo/releases/tags/$tag" -Headers $headers
            foreach ($asset in $release.assets) {
              if ($asset.name -eq "xiaotong-$tag.exe") {
                Invoke-RestMethod "https://api.github.com/repos/$repo/releases/assets/$($asset.id)" -Method Delete -Headers $headers
                Write-Host "Deleted old asset: xiaotong-$tag.exe (id=$($asset.id))"
              }
            }
          } catch {
            Write-Host "No existing release found, skipping asset cleanup"
          }

      - name: Extract tag annotation
        id: tag_msg
        run: |
          $tag = "${{ env.VERSION }}"
          # 尝试读取注释标签的消息（跳过第一行标题，取正文部分）
          $msg = git tag -l --format='%(contents:body)' $tag 2>$null
          if (-not $msg -or $msg.Trim() -eq '') {
            # 回退：读取完整消息
            $msg = git tag -l --format='%(contents)' $tag 2>$null
          }
          if (-not $msg -or $msg.Trim() -eq '') {
            $msg = "Release $tag"
          }
          # 写入多行输出到 GITHUB_OUTPUT
          $msg = $msg.Trim()
          "BODY<<EOF" | Out-File -Append $env:GITHUB_OUTPUT
          $msg | Out-File -Append $env:GITHUB_OUTPUT
          "EOF" | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "Release body extracted ($($msg.Length) chars)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: 蓝色小嗵 ${{ env.VERSION }}
          body: ${{ steps.tag_msg.outputs.BODY }}
          files: dist/xiaotong-${{ env.VERSION }}.exe

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Update download proxy function link
        run: |
          $version = "${{ env.VERSION }}"
          $jsFile = "gh-pages-dir/functions/download.js"
          if (Test-Path $jsFile) {
            $content = Get-Content $jsFile -Raw
            $content = $content -replace 'releases/download/v[\d.]+/xiaotong(-v[\d.]+)?\.exe', "releases/download/$version/xiaotong-$version.exe"
            $content = $content -replace 'fileName = "xiaotong(-v[\d.]+)?\.exe"', "fileName = `"xiaotong-$version.exe`""
            Set-Content $jsFile $content -NoNewline
            Write-Host "Updated download.js with URL and fileName for $version"
          } else {
            Write-Error "download.js not found in gh-pages branch"
          }

      - name: Commit and push landing page updates
        run: |
          cd gh-pages-dir
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add functions/download.js
          $status = git status --porcelain
          if ($status) {
            git commit -m "chore: auto-update download function URL for ${{ env.VERSION }}"
            git push origin gh-pages
          } else {
            Write-Host "No changes in download function link"
          }
