name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyQt5 pynput pyinstaller

      - name: Inject version from tag
        run: |
          $ver = "${{ env.VERSION }}"
          $file = "src/status_panel.py"
          (Get-Content $file -Raw) -replace '版本号：v[\d.]+', "版本号：$ver" | Set-Content $file -NoNewline

      - name: Restore donate QR image
        run: |
          $b64 = Get-Content "data/donate_qr.b64" -Raw
          [System.IO.File]::WriteAllBytes("$PWD/shoukuanma.jpg", [Convert]::FromBase64String($b64))

      - name: Build EXE
        run: python -m PyInstaller tools/build_onefile.spec --noconfirm

      - name: Verify build output
        run: |
          if (!(Test-Path "dist/xiaotong.exe")) { Write-Error "Build failed: xiaotong.exe not found"; exit 1 }
          $size = (Get-Item "dist/xiaotong.exe").Length / 1MB
          Write-Host "Build successful: xiaotong.exe ($([math]::Round($size, 1)) MB)"

      - name: Rename build output to include version
        run: |
          $ver = "${{ env.VERSION }}"
          Rename-Item -Path "dist/xiaotong.exe" -NewName "xiaotong-$ver.exe"
          Write-Host "Renamed build to xiaotong-$ver.exe"

      - name: Delete old asset if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ env.VERSION }}"
          $repo = "${{ github.repository }}"
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
          try {
            $release = Invoke-RestMethod "https://api.github.com/repos/$repo/releases/tags/$tag" -Headers $headers
            foreach ($asset in $release.assets) {
              if ($asset.name -eq "xiaotong-$tag.exe") {
                Invoke-RestMethod "https://api.github.com/repos/$repo/releases/assets/$($asset.id)" -Method Delete -Headers $headers
                Write-Host "Deleted old asset: xiaotong-$tag.exe (id=$($asset.id))"
              }
            }
          } catch {
            Write-Host "No existing release found, skipping asset cleanup"
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: 蓝色小嗵 ${{ env.VERSION }}
          files: dist/xiaotong-${{ env.VERSION }}.exe
          generate_release_notes: true

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Update landing page links
        run: |
          $version = "${{ env.VERSION }}"
          $htmlFile = "gh-pages-dir/index.html"
          if (Test-Path $htmlFile) {
            $content = Get-Content $htmlFile -Raw
            # 替换最新版重定向链接或旧的带版本号的链接
            $pattern = 'https://github.com/weidaozhong/Tongluv/releases/(latest/download/xiaotong\.exe|download/v[\d.]+/xiaotong-v[\d.]+\.exe)'
            $newUrl = "https://github.com/weidaozhong/Tongluv/releases/download/$version/xiaotong-$version.exe"
            $content = $content -replace $pattern, $newUrl
            Set-Content $htmlFile $content -NoNewline
            Write-Host "Updated landing page links to $newUrl"
          } else {
            Write-Error "index.html not found in gh-pages branch"
          }

      - name: Commit and push landing page updates
        run: |
          cd gh-pages-dir
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          $status = git status --porcelain
          if ($status) {
            git commit -m "chore: auto-update landing page download links for ${{ env.VERSION }}"
            git push origin gh-pages
          } else {
            Write-Host "No changes in landing page links"
          }
